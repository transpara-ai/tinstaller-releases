# Calls the org-wide reusable Codex PR review workflow.
# To customize the review prompt for this repo, create .github/codex/prompts/review.md

name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    uses: transpara-ai/.github/.github/workflows/reusable-codex-review.yml@main
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
